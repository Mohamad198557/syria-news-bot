name: 📰 Syria News Bot - كل 15 دقيقة
on:
  # تشغيل تلقائي كل 15 دقيقة
  schedule:
    - cron: "*/15 * * * *"    # كل ربع ساعة
  
  # تشغيل يدوي أيضاً
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: إعداد Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: تثبيت المكتبات
      run: pip install -r requirements.txt
    
    - name: تشغيل البوت
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python news_bot.py
