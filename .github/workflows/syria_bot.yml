name: Syria News Bot Daily Run

on:
  schedule:
    # التشغيل كل 30 دقيقة (في الدقيقة 10 و 40)
    - cron: '10,40 * * * *'
  workflow_dispatch: # للتشغيل اليدوي عند التجربة

jobs:
  build:
    runs-on: ubuntu-latest
    
    # منح صلاحيات الكتابة بشكل صريح داخل الملف (إضافة أمان)
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests feedparser beautifulsoup4 deep-translator

    - name: Run Bot
      env:
        BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        CHAT_ID: ${{ secrets.CHAT_ID }}
      run: python bot.py

    - name: Commit and Push DB change
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        # التأكد من وجود الملف لتجنب خطأ git add في أول مرة
        touch sent_articles.txt 
        git add sent_articles.txt
        git commit -m "Update sent articles DB [skip ci]" || exit 0
        git push
